<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尖端洞察 | 視丘攝影藝術學院 Fotosoft</title>
    <meta name="description" content="視丘攝影藝術學院尖端洞察：吳嘉寶老師與視丘團隊關於攝影史、影像理論、視覺心理學與教育觀察的專欄文章。">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;500;700;900&family=Roboto:wght@100;300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Noto Serif TC"', 'serif'],
                        display: ['"Roboto"', 'sans-serif'],
                    },
                    colors: {
                        gallery: {
                            50: '#FFFFFF', 100: '#F8F9FA', 200: '#E9ECEF',
                            300: '#DEE2E6', 400: '#ADB5BD', 500: '#6C757D',
                            800: '#343A40', 900: '#212529',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { color: #212529; font-family: "Noto Sans TC", sans-serif; }

        /* 文章卡片 */
        .insight-card {
            position: relative; display: flex; flex-direction: column;
            background: rgba(255,255,255,0.85);
            border: 1px solid rgba(222,226,230,0.9);
            border-radius: 1rem; overflow: hidden;
            transition: transform 0.35s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.35s, border-color 0.35s;
            text-decoration: none; color: inherit; backdrop-filter: blur(8px);
        }
        .insight-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 22px 44px -18px rgba(33,37,41,0.25);
            border-color: #ADB5BD;
        }
        .insight-cover {
            aspect-ratio: 16 / 10; overflow: hidden; background: #E9ECEF; position: relative;
        }
        .insight-cover img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(0.15);
            transition: transform 0.7s ease, filter 0.5s ease;
        }
        .insight-card:hover .insight-cover img {
            transform: scale(1.04);
            filter: grayscale(0);
        }
        .insight-body {
            padding: 1.3rem 1.4rem 1.4rem;
            display: flex; flex-direction: column; gap: 0.7rem; flex: 1;
        }
        .insight-meta {
            display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap;
            font-size: 0.7rem; font-weight: 700;
            color: #6C757D; letter-spacing: 0.05em;
        }
        .insight-no {
            font-family: 'Roboto', sans-serif; font-weight: 900;
            letter-spacing: 0.18em; padding: 0.18rem 0.55rem;
            border-radius: 999px; background: rgba(33,37,41,0.08); color: #212529;
        }
        .insight-cat {
            display: inline-flex; align-items: center; gap: 0.25rem;
            color: #343A40;
        }
        .insight-title {
            font-family: "Noto Serif TC", serif;
            font-size: 1.15rem; font-weight: 700; color: #212529;
            line-height: 1.45; letter-spacing: 0.01em;
            display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .insight-summary {
            font-size: 0.85rem; color: #6C757D; line-height: 1.75;
            display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .insight-cta {
            margin-top: auto; padding-top: 0.75rem;
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.78rem; font-weight: 700; color: #212529;
            border-top: 1px dashed rgba(173,181,189,0.7);
            transition: gap 0.2s ease, color 0.2s ease;
        }
        .insight-card:hover .insight-cta { gap: 0.75rem; color: #6C757D; }
        .insight-featured-badge {
            position: absolute; top: 0.65rem; left: 0.7rem;
            padding: 0.2rem 0.55rem; border-radius: 999px;
            background: rgba(33,37,41,0.85); color: #fff;
            font-size: 0.62rem; font-weight: 700; letter-spacing: 0.18em;
            text-transform: uppercase; backdrop-filter: blur(6px); z-index: 2;
        }

        /* 分類 chips */
        .cat-chip {
            display: inline-flex; align-items: center;
            padding: 0.4rem 0.95rem; border-radius: 999px;
            border: 1px solid rgba(222,226,230,0.9);
            background: rgba(255,255,255,0.7);
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em;
            color: #495057; cursor: pointer; user-select: none;
            transition: all 0.2s ease;
        }
        .cat-chip:hover { background: rgba(233,236,239,0.9); color: #212529; }
        .cat-chip.active {
            background: linear-gradient(180deg, #343A40 0%, #212529 100%);
            color: #fff; border-color: #212529;
        }

        /* 分頁 */
        .pager-btn {
            min-width: 2.4rem; height: 2.4rem;
            padding: 0 0.75rem; border-radius: 0.75rem;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; letter-spacing: 0.06em;
            border: 1px solid rgba(222,226,230,0.9);
            background: rgba(255,255,255,0.75); color: #343A40;
            transition: all 0.2s ease; cursor: pointer;
        }
        .pager-btn:hover { background: #fff; border-color: #ADB5BD; color: #212529; }
        .pager-btn.active {
            background: linear-gradient(180deg, #343A40 0%, #212529 100%);
            color: #fff; border-color: #212529;
        }
        .pager-btn[disabled] { opacity: 0.35; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen antialiased selection:bg-gallery-900 selection:text-white">

    <div id="shared-global-bg"></div>
    <div id="shared-header"></div>

    <!-- ===== 頁面標題 Hero ===== -->
    <section class="pt-8 md:pt-12 pb-6 md:pb-10 px-6 md:px-12 relative overflow-hidden">
        <div class="absolute top-16 right-0 pointer-events-none select-none overflow-hidden w-full flex justify-end opacity-[0.04]">
            <span class="font-display font-black text-[16vw] leading-none tracking-tighter text-black">INSIGHTS</span>
        </div>
        <div class="max-w-7xl mx-auto relative z-10">
            <div class="flex items-center gap-4 mb-6">
                <div class="h-px w-12 bg-gallery-800"></div>
                <p class="text-[10px] font-bold tracking-[0.3em] text-gallery-400 uppercase font-display">Fotosoft Insights</p>
            </div>
            <h1 class="font-serif text-4xl md:text-6xl lg:text-7xl font-bold text-gallery-900 leading-tight">
                尖端洞察<br>
                <span class="italic font-light text-gallery-400 text-3xl md:text-4xl lg:text-5xl">Photography Perspectives</span>
            </h1>
            <p class="mt-8 max-w-3xl text-gallery-500 text-base md:text-lg leading-loose">
                吳嘉寶老師與視丘團隊關於攝影史、影像理論、視覺心理學與教育觀察的長期書寫。<br>
                每一篇都是我們對「觀看」這件事持續思考的軌跡。
            </p>
        </div>
    </section>

    <!-- ===== 分類篩選 ===== -->
    <section class="px-6 md:px-12 pb-8">
        <div class="max-w-7xl mx-auto">
            <div id="insight-cats" class="flex flex-wrap gap-2 md:gap-3"></div>
        </div>
    </section>

    <!-- ===== 文章卡片列表 ===== -->
    <section id="insights" class="px-6 md:px-12 pb-16">
        <div class="max-w-7xl mx-auto">
            <div id="insights-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8"></div>
            <p id="insights-empty" class="hidden text-center text-gallery-400 py-24 text-sm tracking-widest">
                尚無文章。管理者請按 <kbd class="px-2 py-0.5 border border-gallery-300 rounded text-xs">⌘ + ⇧ + E</kbd> 開啟後台新增。
            </p>
            <nav id="insights-pager" class="mt-12 flex flex-wrap items-center justify-center gap-1.5" aria-label="分頁"></nav>
        </div>
    </section>

    <!-- ===== 使用說明卡 ===== -->
    <section class="px-6 md:px-12 pb-24">
        <div class="max-w-5xl mx-auto">
            <div class="rounded-3xl p-8 md:p-10 bg-white/60 border border-gallery-200 backdrop-blur">
                <div class="flex flex-col md:flex-row items-start gap-6">
                    <span class="w-14 h-14 rounded-2xl bg-gallery-900 text-white flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-feather-pointed text-xl"></i>
                    </span>
                    <div>
                        <h3 class="font-serif text-xl md:text-2xl font-bold text-gallery-900 mb-2">關於本專欄</h3>
                        <p class="text-sm md:text-base text-gallery-500 leading-relaxed">
                            尖端洞察為視丘攝影藝術學院不定期更新的觀點專欄，內容包含攝影史事件、當代影像現象、視覺心理學研究以及教育觀察。
                            若對特定主題有興趣或有想討論的議題，歡迎透過官方 LINE 與我們聯繫。
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="shared-cta"></div>
    <div id="shared-footer"></div>

    <script src="js/shared-layout.js"></script>
    <script src="js/insights-data.js"></script>
    <script>
        SharedLayout.mount({ activeNav: 'insights' });

        (function initInsightsPage() {
            const grid = document.getElementById('insights-grid');
            const empty = document.getElementById('insights-empty');
            const pager = document.getElementById('insights-pager');
            const catsEl = document.getElementById('insight-cats');
            const PAGE_SIZE = 12;

            let currentPage = 1;
            let activeCat = 'all';

            function esc(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            }

            function renderCats() {
                const all = InsightsStore.getAll();
                const counts = new Map();
                counts.set('all', all.length);
                all.forEach(p => (p.categories || []).forEach(c => {
                    counts.set(c, (counts.get(c) || 0) + 1);
                }));
                const cats = Array.from(counts.entries()).filter(([k, v]) => k === 'all' || v > 0);
                catsEl.innerHTML = cats.map(([cat, n]) => {
                    const label = cat === 'all' ? '全部文章' : cat;
                    const active = cat === activeCat ? 'active' : '';
                    return `<button type="button" class="cat-chip ${active}" data-cat="${esc(cat)}">
                        ${esc(label)} <span class="ml-1.5 text-[10px] opacity-70">${n}</span>
                    </button>`;
                }).join('');
                catsEl.querySelectorAll('[data-cat]').forEach(el => {
                    el.addEventListener('click', () => {
                        activeCat = el.getAttribute('data-cat');
                        currentPage = 1;
                        renderCats();
                        renderGrid();
                    });
                });
            }

            function filterList() {
                const all = InsightsStore.getAll();
                if (activeCat === 'all') return all;
                return all.filter(p => (p.categories || []).includes(activeCat));
            }

            function renderGrid() {
                const list = filterList();
                grid.innerHTML = '';
                pager.innerHTML = '';

                if (!list.length) {
                    empty.classList.remove('hidden');
                    return;
                }
                empty.classList.add('hidden');

                const totalPages = Math.max(1, Math.ceil(list.length / PAGE_SIZE));
                if (currentPage > totalPages) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;
                const startIdx = (currentPage - 1) * PAGE_SIZE;
                const pageItems = list.slice(startIdx, startIdx + PAGE_SIZE);

                grid.innerHTML = pageItems.map((p, i) => {
                    const cover = InsightsStore.coverOf(p);
                    const summary = InsightsStore.summaryOf(p, 110);
                    const cat = (p.categories && p.categories[0]) || '專欄';
                    const num = String(startIdx + i + 1).padStart(2, '0');
                    return `
                        <a href="insight-detail.html?id=${encodeURIComponent(p.id)}" class="insight-card">
                            ${p.featured ? '<span class="insight-featured-badge">Featured</span>' : ''}
                            <div class="insight-cover">
                                <img src="${esc(cover)}" alt="${esc(p.title)}" loading="lazy"
                                     onerror="this.src='${esc(InsightsStore.pickFallbackCover(p.id))}';">
                            </div>
                            <div class="insight-body">
                                <div class="insight-meta">
                                    <span class="insight-no">No.${num}</span>
                                    ${p.publishedDate ? `<span><i class="fa-regular fa-calendar mr-1"></i>${esc(p.publishedDate)}</span>` : ''}
                                    ${cat ? `<span class="insight-cat"><i class="fa-solid fa-tag text-[9px]"></i>${esc(cat)}</span>` : ''}
                                </div>
                                <h3 class="insight-title">${esc(p.title)}</h3>
                                ${summary ? `<p class="insight-summary">${esc(summary)}</p>` : ''}
                                <span class="insight-cta">閱讀全文 <i class="fa-solid fa-arrow-right-long text-xs"></i></span>
                            </div>
                        </a>
                    `;
                }).join('');

                renderPager(totalPages);
            }

            function renderPager(totalPages) {
                if (totalPages <= 1) { pager.innerHTML = ''; return; }
                const mk = (label, page, opts = {}) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'pager-btn' + (opts.active ? ' active' : '');
                    btn.textContent = label;
                    if (opts.disabled) btn.disabled = true;
                    if (!opts.disabled && !opts.active) {
                        btn.addEventListener('click', () => {
                            currentPage = page;
                            renderGrid();
                            const sec = document.getElementById('insights');
                            if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        });
                    }
                    return btn;
                };
                const mkEllipsis = () => {
                    const s = document.createElement('span');
                    s.textContent = '…';
                    s.className = 'px-1 text-gallery-400';
                    return s;
                };
                pager.innerHTML = '';
                pager.appendChild(mk('«', currentPage - 1, { disabled: currentPage === 1 }));
                const set = new Set([1, totalPages, currentPage, currentPage - 1, currentPage + 1, currentPage - 2, currentPage + 2]);
                const arr = Array.from(set).filter(p => p >= 1 && p <= totalPages).sort((a, b) => a - b);
                let prev = 0;
                arr.forEach(p => {
                    if (p - prev > 1) pager.appendChild(mkEllipsis());
                    pager.appendChild(mk(String(p), p, { active: p === currentPage }));
                    prev = p;
                });
                pager.appendChild(mk('»', currentPage + 1, { disabled: currentPage === totalPages }));
            }

            function refreshAll() {
                renderCats();
                renderGrid();
            }

            refreshAll();
            InsightsStore.subscribe(refreshAll);

            // 部署後拉遠端 JSON 覆蓋
            InsightsStore.refreshFromRemote().then(ok => { if (ok) refreshAll(); });
        })();
    </script>
    <script src="js/insights-admin.js"></script>
</body>
</html>

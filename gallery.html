<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視丘家族藝廊 | 視丘攝影藝術學院</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;500;700;900&family=Roboto:wght@100;300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Noto Serif TC"', 'serif'],
                        display: ['"Roboto"', 'sans-serif'],
                    },
                    colors: {
                        gallery: {
                            50: '#FFFFFF', 100: '#F8F9FA', 200: '#E9ECEF',
                            300: '#DEE2E6', 400: '#ADB5BD', 500: '#6C757D',
                            800: '#343A40', 900: '#212529',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: #F8F9FA;
            color: #212529;
            font-family: "Noto Sans TC", sans-serif;
        }
        .card-hover img { transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .card-hover:hover img { transform: scale(1.05); }
        .filter-chip.active {
            background: #212529; color: #fff; border-color: #212529;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="shared-global-bg"></div>
    <div id="shared-header"></div>

    <!-- Page Title -->
    <section class="pt-16 pb-12 px-6 md:px-12">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center gap-4 mb-6">
                <div class="h-px w-12 bg-gallery-800"></div>
                <p class="text-[10px] font-bold tracking-[0.3em] text-gallery-400 uppercase font-display">Family Gallery</p>
            </div>
            <h1 class="font-serif text-4xl md:text-6xl font-bold text-gallery-900">家族藝廊</h1>
            <p class="mt-5 text-gallery-500 text-base md:text-lg max-w-2xl leading-relaxed">
                視丘學員與老師的創作集結。每一張影像，皆是從觀看、書寫到創作的完整歷程。
            </p>
        </div>
    </section>

    <!-- Filter Bar -->
    <section class="px-6 md:px-12 mb-10">
        <div class="max-w-7xl mx-auto">
            <div id="filter-bar" class="flex flex-wrap gap-2">
                <!-- 動態注入分類按鈕 -->
            </div>
            <div class="mt-4 text-xs text-gallery-400 font-display tracking-widest">
                <span id="work-count">0</span> WORKS
            </div>
        </div>
    </section>

    <!-- Gallery Grid -->
    <section class="px-6 md:px-12 pb-24">
        <div class="max-w-7xl mx-auto">
            <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- 動態注入作品卡 -->
            </div>
            <div id="empty-state" class="hidden text-center py-24 text-gallery-400">
                <div class="text-5xl mb-4">📷</div>
                <p class="font-serif text-2xl mb-2">此分類尚無作品</p>
                <p class="text-sm">請選擇其他分類，或按 <kbd class="px-2 py-0.5 border border-gallery-300 rounded text-xs">⌘ + ⇧ + E</kbd> 開啟後台新增作品。</p>
            </div>
        </div>
    </section>

    <div id="shared-cta"></div>
    <div id="shared-footer"></div>

    <script src="js/shared-layout.js"></script>
    <script>
        SharedLayout.mount({ activeNav: 'gallery' });
    </script>
    <script src="js/works-data.js"></script>
    <script>
        (function () {
            const grid = document.getElementById('gallery-grid');
            const filterBar = document.getElementById('filter-bar');
            const emptyState = document.getElementById('empty-state');
            const countEl = document.getElementById('work-count');

            let activeFilter = 'ALL';

            function esc(s) {
                return String(s == null ? '' : s)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            }

            function resolveAssetPath(src) {
                const path = String(src || '').trim();
                if (!path) return '';
                if (/^(?:https?:)?\/\//i.test(path) || /^data:/i.test(path)) return path;
                if (!path.startsWith('/')) return path;

                const isGitHubPages = /github\.io$/i.test(location.hostname || '');
                if (!isGitHubPages) return path;

                const repo = (location.pathname || '/').split('/').filter(Boolean)[0] || '';
                if (!repo) return path;
                if (path === '/' + repo || path.startsWith('/' + repo + '/')) return path;
                return '/' + repo + path;
            }

            function coverOfWork(work) {
                if (WorksStore && typeof WorksStore.coverOf === 'function') {
                    return WorksStore.coverOf(work);
                }
                return resolveAssetPath(work && work.coverImage ? work.coverImage : '');
            }

            function renderFilters() {
                const cats = ['ALL'].concat(WorksStore.DEFAULT_CATEGORIES);
                filterBar.innerHTML = cats.map(c => `
                    <button class="filter-chip px-4 py-2 border border-gallery-300 rounded-full text-xs tracking-widest text-gallery-500 hover:border-gallery-900 hover:text-gallery-900 transition-colors ${c === activeFilter ? 'active' : ''}"
                            data-filter="${esc(c)}">
                        ${c === 'ALL' ? 'ALL' : esc(c)}
                    </button>
                `).join('');
                filterBar.querySelectorAll('[data-filter]').forEach(btn =>
                    btn.addEventListener('click', () => {
                        activeFilter = btn.getAttribute('data-filter');
                        renderFilters();
                        renderGrid();
                    })
                );
            }

            function renderGrid() {
                const all = WorksStore.getAll();
                const filtered = activeFilter === 'ALL'
                    ? all
                    : all.filter(w => (w.categories || []).includes(activeFilter));

                countEl.textContent = String(filtered.length).padStart(2, '0');

                if (!filtered.length) {
                    grid.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }
                emptyState.classList.add('hidden');

                grid.innerHTML = filtered.map(w => `
                    <a href="work-detail.html?id=${encodeURIComponent(w.id)}"
                       class="card-hover group block overflow-hidden">
                        <div class="aspect-[3/2] overflow-hidden bg-gallery-200 mb-4">
                            <img src="${esc(coverOfWork(w))}" alt="${esc(w.title)}"
                                 class="w-full h-full object-cover"
                                 onerror="this.style.opacity='0.3';">
                        </div>
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0 flex-1">
                                <h3 class="font-serif text-lg md:text-xl text-gallery-900 group-hover:text-gallery-500 transition-colors truncate">
                                    ${esc(w.title)}
                                </h3>
                                <p class="text-xs text-gallery-500 mt-1 truncate">
                                    ${esc(w.subtitle || (w.categories || []).join(' · '))}
                                </p>
                            </div>
                            <i class="fa-solid fa-arrow-right-long text-gallery-400 group-hover:text-gallery-900 group-hover:translate-x-1 transition-all mt-2 shrink-0"></i>
                        </div>
                        ${w.tags && w.tags.length ? `
                            <div class="mt-2 flex flex-wrap gap-1">
                                ${w.tags.map(t => `<span class="text-[10px] px-2 py-0.5 bg-gallery-100 text-gallery-500 rounded-full">${esc(t)}</span>`).join('')}
                            </div>
                        ` : ''}
                    </a>
                `).join('');
            }

            renderFilters();
            renderGrid();
            WorksStore.subscribe(() => {
                renderFilters();
                renderGrid();
            });
        })();
    </script>
    <script src="js/admin.js"></script>
</body>
</html>

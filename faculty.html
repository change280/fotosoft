<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>師資團隊 | 視丘攝影藝術學院 Fotosoft</title>
    <meta name="description" content="視丘攝影藝術學院師資團隊：由創辦人吳嘉寶老師領軍，長期匯集台灣專業攝影界第一線師資的私塾大學攝影系。">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;500;700;900&family=Roboto:wght@100;300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Noto Serif TC"', 'serif'],
                        display: ['"Roboto"', 'sans-serif'],
                    },
                    colors: {
                        gallery: {
                            50: '#FFFFFF', 100: '#F8F9FA', 200: '#E9ECEF',
                            300: '#DEE2E6', 400: '#ADB5BD', 500: '#6C757D',
                            800: '#343A40', 900: '#212529',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { color: #212529; font-family: "Noto Sans TC", sans-serif; }

        /* Faculty grid card (editorial tall card) */
        .faculty-card {
            position: relative; display: flex; flex-direction: column;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.9);
            border-radius: 1.75rem;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(31,38,135,0.05);
            text-decoration: none; color: inherit;
            transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), background 0.5s ease, box-shadow 0.5s ease;
            height: 100%;
        }
        .faculty-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.85);
            box-shadow: 0 24px 48px -20px rgba(33,37,41,0.22);
        }
        .faculty-media { position: relative; height: 360px; overflow: hidden; background: #E9ECEF; }
        .faculty-media img {
            position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(1); opacity: 0.85;
            transition: transform 1s ease, filter .7s ease, opacity .5s ease;
        }
        .faculty-card:hover .faculty-media img { transform: scale(1.055); filter: grayscale(0); opacity: 1; }
        .faculty-media::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,.55));
            opacity: .72; transition: opacity .45s ease;
        }
        .faculty-card:hover .faculty-media::after { opacity: .42; }
        .faculty-media.image-failed {
            background:
                radial-gradient(circle at 22% 18%, rgba(255,255,255,.9), transparent 24%),
                linear-gradient(135deg, rgba(222,226,230,.9), rgba(173,181,189,.38));
        }
        .faculty-media-initials {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,.20);
            font-family: 'Roboto', sans-serif; font-weight: 900;
            font-size: 4.5rem; pointer-events: none;
        }
        .faculty-media-tags {
            position: absolute; top: 1.25rem; left: 1.25rem; z-index: 2;
            display: flex; gap: 0.5rem; flex-wrap: wrap;
        }
        .faculty-media-tag {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.95);
            padding: 0.3rem 0.75rem;
            font-size: 0.62rem; font-weight: 700; letter-spacing: 0.16em;
            color: #212529; border-radius: 999px;
        }
        .faculty-media-caption {
            position: absolute; left: 0; right: 0; bottom: 0; z-index: 2;
            padding: 1.75rem; color: #fff;
        }
        .faculty-media-num {
            font-family: 'Roboto', sans-serif;
            font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase;
            color: rgba(255,255,255,.65); margin-bottom: 0.5rem;
        }
        .faculty-media-name {
            font-family: 'Noto Serif TC', serif;
            font-size: 2.1rem; font-weight: 700; line-height: 1.15;
            margin-bottom: 0.4rem;
        }
        .faculty-media-en {
            font-size: 0.82rem; letter-spacing: 0.18em;
            color: rgba(255,255,255,.78); font-weight: 500;
        }
        .faculty-body {
            padding: 1.75rem 1.85rem;
            display: flex; flex-direction: column;
            gap: 1rem; flex: 1;
        }
        .faculty-title-line {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em; color: #ADB5BD;
        }
        .faculty-course {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.12rem;
            font-weight: 700;
            color: #212529;
            line-height: 1.55;
        }
        .faculty-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .faculty-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.34rem 0.75rem;
            border-radius: 999px;
            background: #F8F9FA;
            border: 1px solid #DEE2E6;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            color: #495057;
        }
        .faculty-quote {
            font-size: 0.98rem; color: #212529; line-height: 1.75;
            font-weight: 500; min-height: 4.5rem;
        }
        .faculty-footer {
            margin-top: auto; padding-top: 1.5rem;
            border-top: 1px solid #E9ECEF;
            display: flex; align-items: center; justify-content: space-between;
        }
        .faculty-cta {
            display: inline-flex; align-items: center; gap: 0.75rem;
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em;
            color: #212529; transition: color .2s ease, gap .2s ease;
        }
        .faculty-card:hover .faculty-cta { gap: 1rem; color: #6C757D; }

        /* Founder spotlight (editorial hero card) */
        .founder-spotlight {
            position: relative; display: block;
            border-radius: 2rem; overflow: hidden;
            padding: 1.5rem;
            background:
                radial-gradient(circle at 82% 12%, rgba(255,255,255,.9), transparent 34%),
                linear-gradient(135deg, rgba(255,255,255,.82), rgba(248,249,250,.64));
            border: 1px solid rgba(255,255,255,.92);
            box-shadow: 0 34px 90px -45px rgba(33,37,41,.34), 0 10px 32px rgba(31,38,135,.045);
            text-decoration: none; color: inherit;
            transition: transform .5s ease, box-shadow .5s ease;
        }
        .founder-spotlight:hover {
            transform: translateY(-4px);
            box-shadow: 0 44px 100px -40px rgba(33,37,41,.4), 0 12px 34px rgba(31,38,135,.06);
        }
        @media (min-width: 768px) { .founder-spotlight { border-radius: 2.5rem; padding: 2.25rem; } }
        @media (min-width: 1024px) { .founder-spotlight { padding: 3rem; } }
        .founder-grid {
            display: grid; grid-template-columns: 1fr;
            gap: 2rem; align-items: center;
        }
        @media (min-width: 1024px) {
            .founder-grid { grid-template-columns: 5fr 7fr; gap: 3rem; }
        }
        .founder-portrait {
            overflow: hidden; border-radius: 1.45rem;
            background: #E9ECEF; aspect-ratio: 4/3;
        }
        @media (min-width: 1024px) {
            .founder-portrait { aspect-ratio: 1.18/1; border-radius: 1.75rem; }
        }
        .founder-portrait img {
            width: 100%; height: 100%; object-fit: cover; object-position: center 25%;
            filter: grayscale(0.9); opacity: 0.9;
            transition: transform 1.1s cubic-bezier(0.22,1,0.36,1), filter .9s ease, opacity .9s ease;
        }
        .founder-spotlight:hover .founder-portrait img { transform: scale(1.035); filter: grayscale(0); opacity: 1; }
        .founder-info { padding: 0.25rem; }
        @media (min-width: 1024px) { .founder-info { padding-right: 2.5rem; } }
        .founder-kicker {
            display: inline-flex; align-items: center;
            padding: 0.55rem 1rem;
            font-family: 'Roboto', sans-serif; font-weight: 900;
            font-size: 0.7rem; letter-spacing: 0.28em; text-transform: uppercase;
            background: #212529; color: #fff;
            box-shadow: 0 12px 28px -20px rgba(33,37,41,.9);
            margin-bottom: 1.5rem;
        }
        .founder-name {
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(2.6rem, 4.5vw, 3.6rem); font-weight: 700;
            color: #212529; line-height: 1;
            margin-bottom: 0.6rem;
        }
        .founder-en {
            font-family: 'Roboto', sans-serif;
            font-size: 0.95rem; letter-spacing: 0.22em; text-transform: uppercase;
            color: #ADB5BD; margin-bottom: 1.6rem;
        }
        .founder-role {
            font-family: 'Noto Serif TC', serif;
            font-size: 1.4rem; font-weight: 700; color: #343A40;
            margin-bottom: 1.25rem;
        }
        .founder-summary {
            font-size: 1.02rem; line-height: 2; color: #343A40;
            font-weight: 500; letter-spacing: 0.01em;
            max-width: 42rem; margin-bottom: 1.5rem;
        }
        .founder-cta {
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid #212529; padding: 1rem 2.25rem;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.22em;
            color: #212529; background: rgba(255,255,255,.35);
            transition: all .3s ease;
        }
        .founder-spotlight:hover .founder-cta { background: #212529; color: #fff; }

        /* Previous faculty list */
        .previous-faculty-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(222,226,230,0.9);
            border-radius: 0.85rem;
            background: rgba(255,255,255,0.7);
            transition: all 0.2s ease;
            color: inherit; text-decoration: none;
        }
        .previous-faculty-item:hover {
            background: #fff; border-color: #ADB5BD;
            transform: translateY(-2px);
            box-shadow: 0 10px 22px -12px rgba(33,37,41,0.2);
        }
        .previous-faculty-name {
            font-family: 'Noto Serif TC', serif; font-weight: 700;
            font-size: 1rem; color: #212529; min-width: 4.5rem; flex-shrink: 0;
        }
        .previous-faculty-courses { font-size: 0.8rem; color: #6C757D; line-height: 1.6; }

        .prev-collapse { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }
        .prev-collapse.open { max-height: 12000px; }
        .prev-toggle-icon { transition: transform 0.3s ease; }
        .prev-collapse.open ~ * .prev-toggle-icon,
        details[open] .prev-toggle-icon { transform: rotate(180deg); }

        /* Admin hint */
        .admin-hint {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            padding: 0.5rem 1rem; border-radius: 999px;
            background: rgba(33,37,41,0.8); color: #fff;
            font-size: 0.7rem; letter-spacing: 0.15em;
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none; z-index: 50;
        }
        .admin-hint.show { opacity: 1; }
    </style>
</head>
<body class="min-h-screen antialiased selection:bg-gallery-900 selection:text-white">

    <div id="shared-global-bg"></div>
    <div id="shared-header"></div>

    <!-- Hero -->
    <section class="pt-8 md:pt-12 pb-8 md:pb-12 px-6 md:px-12 relative overflow-hidden">
        <div class="absolute top-20 right-0 pointer-events-none select-none overflow-hidden w-full flex justify-end opacity-[0.04]">
            <span class="font-display font-black text-[16vw] leading-none tracking-tighter text-black">FACULTY</span>
        </div>
        <div class="max-w-7xl mx-auto relative z-10">
            <div class="flex items-center gap-4 mb-6">
                <div class="h-px w-12 bg-gallery-800"></div>
                <p class="text-[10px] font-bold tracking-[0.3em] text-gallery-400 uppercase font-display">Faculty · 師資團隊</p>

            <h1 class="font-serif text-4xl md:text-6xl lg:text-7xl font-bold text-gallery-900 leading-tight">
                師資團隊<br>
                <span class="italic font-light text-gallery-400 text-3xl md:text-4xl lg:text-5xl">Faculty & Lecturers</span>

    <!-- Founder pinned -->

    <section id="previous-faculty-section" class="px-6 md:px-12 pt-16 pb-24">

            <div class="flex items-center gap-4 mb-6">
                <span class="font-display text-[10px] tracking-[0.3em] font-bold text-gallery-400 uppercase">Previous Faculty</span>
                <div class="h-px flex-1 bg-gallery-200"></div>

            </div>

            <button id="prev-toggle" type="button" class="w-full flex items-center justify-between gap-4 px-6 py-5 rounded-2xl border border-gallery-200 bg-white/70 hover:bg-white transition-all text-left">
                <div>
                    <p class="font-serif text-xl font-bold text-gallery-900">視丘曾任師資</p>
                    <p class="text-xs tracking-widest text-gallery-500 mt-1">
                        曾任視丘的授課老師與其對應課程（點擊展開／收合）

                </div>
                <span class="w-10 h-10 rounded-full border border-gallery-300 bg-white flex items-center justify-center text-gallery-700">

                <div id="prev-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mt-6"></div>
                <p id="prev-empty" class="text-center text-gallery-400 text-sm py-8 hidden">尚無曾任師資資料。</p>
            </div>
        </div>

    <div class="admin-hint" id="admin-hint">按下 <b>⌘ / Ctrl + Shift + E</b> 開啟管理面板</div>

    <div id="shared-cta"></div>
    <div id="shared-footer"></div>

    <script src="js/shared-layout.js"></script>
    <script>
        SharedLayout.mount({ activeNav: 'faculty' });
    </script>
    <script src="js/faculty-data.js?v=20260707a"></script>
    <script>
        (function () {
            const founderSlot = document.getElementById('founder-slot');
            const currentGrid = document.getElementById('current-grid');
            const currentEmpty = document.getElementById('current-empty');
            const currentCountEl = document.getElementById('current-count');
            const prevGrid = document.getElementById('prev-grid');
            const prevEmpty = document.getElementById('prev-empty');
            const prevCountEl = document.getElementById('previous-count');
            const prevToggle = document.getElementById('prev-toggle');
            const prevCollapse = document.getElementById('prev-collapse');
            const PREVIOUS_SECTION_HASH = '#previous-faculty-section';

            function esc(s) {
                return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
            }

            function detailHref(p) { return 'faculty-detail.html?id=' + encodeURIComponent(p.id); }

            function initialsOf(en, name) {
                if (en && en.trim()) {
                    return en.trim().split(/\s+/).map(function (s) { return s[0] || ''; }).join('').slice(0, 3).toUpperCase();
                }
                return String(name || '').slice(0, 1);
            }

            function tagsFromCourses(str) {
                return String(str || '')
                    .split(/[、,，;；\/\|]+/)
                    .map(function (s) { return s.trim(); })
                    .filter(Boolean)
                    .slice(0, 2);
            }

            function founderHTML(p) {
                const photo = FacultyStore.photoOf(p);
                return `
                    <a href="${detailHref(p)}" class="founder-spotlight group" aria-label="進入 ${esc(p.name)} 完整簡介">
                        <div class="founder-grid">
                            <div class="founder-portrait">
                                <img src="${esc(photo)}" alt="${esc(p.name)}">
                            </div>
                            <div class="founder-info">
                                <span class="founder-kicker">Founder</span>
                                <h2 class="founder-name">${esc(p.name)}</h2>
                                ${p.englishName ? `<p class="founder-en">${esc(p.englishName)}</p>` : ''}
                                ${p.title ? `<h3 class="founder-role">${esc(p.title)}</h3>` : ''}
                                ${p.summary ? `<p class="founder-summary">${esc(p.summary)}</p>` : ''}
                                <span class="founder-cta">閱讀完整簡介</span>
                            </div>
                        </div>
                    </a>
                `;
            }

            function facultyCardHTML(p, index) {
                const photo = FacultyStore.photoOf(p);
                const num = String(index + 1).padStart(2, '0');
                const course = (p.course && p.course.trim()) || (p.courses && p.courses.trim()) || '';
                const tags = Array.isArray(p.tags) && p.tags.length ? p.tags.slice(0, 3) : tagsFromCourses(course);
                return `
                    <a href="${detailHref(p)}" class="faculty-card">
                        <div class="faculty-media">
                            <img src="${esc(photo)}" alt="${esc(p.name)}" loading="lazy" onerror="this.closest('.faculty-media').classList.add('image-failed');this.remove();">
                            ${tags.length ? `<div class="faculty-media-tags">${tags.map(function (t) { return `<span class="faculty-media-tag">${esc(t)}</span>`; }).join('')}</div>` : ''}
                            <div class="faculty-media-caption">
                                <p class="faculty-media-num">${num} / Mentor</p>
                                <h3 class="faculty-media-name">${esc(p.name)}</h3>
                                ${p.englishName ? `<p class="faculty-media-en">${esc(p.englishName)}</p>` : ''}
                            </div>
                        </div>
                        <div class="faculty-body">
                            ${p.title ? `<p class="faculty-title-line">${esc(p.title)}</p>` : ''}
                            ${course ? `<p class="faculty-course">${esc(course)}</p>` : ''}
                            ${tags.length ? `<div class="faculty-tags">${tags.map(function (t) { return `<span class="faculty-tag">${esc(t)}</span>`; }).join('')}</div>` : ''}
                            <div class="faculty-footer">
                                <span class="faculty-cta">查看簡介 <i class="fa-solid fa-arrow-right-long"></i></span>
                            </div>
                        </div>
                    </a>
                `;
            }

            function previousItemHTML(p) {
                return `
                    <div class="previous-faculty-item" role="listitem" aria-label="${esc(p.name)} 曾任師資資訊">
                        <span class="previous-faculty-name">${esc(p.name)}</span>
                        <span class="previous-faculty-courses">${esc(p.courses || '')}</span>
                    </div>
                `;
            }

            function render() {
                const all = FacultyStore.getAll();
                const currentList = all.filter(p => p.status !== 'previous');
                const previousList = all.filter(p => p.status === 'previous');

                // Founder (first pinned current) or first current
                const founder = currentList.find(p => p.pinned) || currentList[0] || null;
                const others = currentList.filter(p => !founder || p.id !== founder.id);

                founderSlot.innerHTML = founder ? founderHTML(founder) : '<p class="text-center text-gallery-400 text-sm py-8">尚未設置創辦人，請以管理模式（⌘/Ctrl+Shift+E）新增。</p>';

                currentGrid.innerHTML = others.map(function (p, i) { return facultyCardHTML(p, i); }).join('');
                currentEmpty.classList.toggle('hidden', others.length > 0);
                currentCountEl.textContent = others.length + ' 位';

                prevGrid.innerHTML = previousList.map(previousItemHTML).join('');
                prevEmpty.classList.toggle('hidden', previousList.length > 0);
                prevCountEl.textContent = previousList.length + ' 位';
            }

            // Collapsible previous
            let opened = false;
            function setPreviousExpanded(expanded) {
                opened = !!expanded;
                prevCollapse.classList.toggle('open', opened);
                const icon = prevToggle.querySelector('.prev-toggle-icon');
                if (icon) icon.style.transform = opened ? 'rotate(180deg)' : 'rotate(0)';
            }
            prevToggle.addEventListener('click', () => setPreviousExpanded(!opened));

            function expandPreviousByHash() {
                if (location.hash !== PREVIOUS_SECTION_HASH) return;
                setPreviousExpanded(true);
            }
            expandPreviousByHash();
            window.addEventListener('hashchange', expandPreviousByHash);
            document.addEventListener('click', function (e) {
                const link = e.target && e.target.closest ? e.target.closest('a[href]') : null;
                if (!link) return;
                const href = link.getAttribute('href') || '';
                if (href !== 'faculty.html#previous-faculty-section' && href !== '#previous-faculty-section') return;
                setTimeout(function () { setPreviousExpanded(true); }, 0);
            });

            // Admin hint on first shift press
            const hint = document.getElementById('admin-hint');
            let hintShown = false;
            document.addEventListener('keydown', function (e) {
                if (e.shiftKey && (e.metaKey || e.ctrlKey) && !hintShown) {
                    hintShown = true;
                    hint.classList.add('show');
                    setTimeout(() => hint.classList.remove('show'), 2600);
                }
            });

            render();
            FacultyStore.subscribe(render);
            FacultyStore.refreshFromRemote().then(ok => { if (ok) render(); });
        })();
    </script>
    <script src="js/faculty-admin.js?v=20260707a"></script>
</body>
